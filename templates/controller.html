<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Macro Deck | 手柄控制器 (Gamepad)</title>
    <link rel="stylesheet" href="/static/controller/controller.css">
</head>

<body>
    <div class="header">
        <div class="header-btn" onclick="v(); window.location.href='/'">BACK</div>
        <div class="status" id="gp-status">🔴 等待手柄连接 (按任意键)</div>
    </div>

    <div class="main-layout">
        <div class="settings-panel">
            <h2 class="panel-title">手柄映射配置</h2>
            
            <div class="sens-group">
                <label>摇杆灵敏度: <span id="sens-val">5.0</span></label>
                <input type="range" id="param-sens" min="0.5" max="20" step="0.5" value="5">
            </div>
            
            <div class="sens-group">
                <label>死区 (防止摇杆漂移): <span id="dead-val">0.15</span></label>
                <input type="range" id="param-deadzone" min="0.05" max="0.5" step="0.05" value="0.15">
            </div>

            <div class="mapping-list" id="mapping-list">
                <!-- 由 JS 动态渲染 -->
            </div>
        </div>
    </div>

    <!-- 选择框模板用 -->
    <template id="map-select-template">
        <select class="map-sel">
            <optgroup label="基础">
                <option value="none">无动作</option>
            </optgroup>
            <optgroup label="鼠标 (仅用于摇杆)">
                <option value="mouse_move">移动鼠标</option>
                <option value="mouse_scroll">滚动页面</option>
            </optgroup>
            <optgroup label="鼠标 (仅用于按键)">
                <option value="click_left">左键点击</option>
                <option value="click_right">右键点击</option>
                <option value="click_middle">中键点击</option>
                <option value="drag">拖拽 (按住左键)</option>
            </optgroup>
            <optgroup label="键盘常用按键">
                <option value="key_space">空格键 (Space)</option>
                <option value="key_enter">回车键 (Enter)</option>
                <option value="key_esc">退出键 (Esc)</option>
                <option value="key_backspace">退格键 (Backspace)</option>
                <option value="key_up">方向键 上</option>
                <option value="key_down">方向键 下</option>
                <option value="key_left">方向键 左</option>
                <option value="key_right">方向键 右</option>
            </optgroup>
            <!-- 若需扩展组合键，可再加 -->
        </select>
    </template>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/static/controller/controller.js"></script>
</body>

</html>
