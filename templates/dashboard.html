<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AirMouse | 远程控制中心</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #0a0a0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .header {
            text-align: center;
            padding: 30px 0 40px;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            margin: 8px 0 0;
            color: #666;
            font-size: 14px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 30px 0 16px;
            padding-left: 4px;
        }

        .card-grid {
            display: grid;
            gap: 12px;
        }

        .card {
            background: linear-gradient(145deg, #16161d, #1a1a24);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card:active {
            transform: scale(0.98);
            background: linear-gradient(145deg, #1a1a24, #222230);
        }

        .card-icon {
            font-size: 32px;
            margin-right: 16px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
        }

        .card-content {
            flex: 1;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-desc {
            font-size: 13px;
            color: #666;
        }

        .card.large .card-icon {
            width: 64px;
            height: 64px;
            font-size: 36px;
            margin-right: 20px;
            border-radius: 18px;
        }

        .card.large .card-title {
            font-size: 18px;
            margin-bottom: 6px;
        }

        .card.large .card-desc {
            font-size: 14px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-top: 30px;
            font-size: 13px;
            color: #555;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34C759;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .footer {
            text-align: center;
            padding: 30px 0;
            color: #333;
            font-size: 12px;
        }
    </style>
</head>
<body onclick="initAudio()">
    <div class="container">
        <div class="header">
            <div class="logo">🖱️</div>
            <h1>AirMouse</h1>
            <p>远程控制中心</p>
        </div>

        <div class="section-title">主要功能</div>
        <div class="card-grid">
            <div class="card large" onclick="v(); window.location.href='/touchpad'">
                <div class="card-icon">🖱️</div>
                <div class="card-content">
                    <div class="card-title">触摸板控制</div>
                    <div class="card-desc">体感情境 / 体感飞行 / 灵敏调节</div>
                </div>
            </div>

            <div class="card" onclick="v(); window.location.href='/k'">
                <div class="card-icon">⌨️</div>
                <div class="card-content">
                    <div class="card-title">键盘</div>
                    <div class="card-desc">全键盘输入</div>
                </div>
            </div>

            <div class="card" onclick="v(); window.location.href='/v'">
                <div class="card-icon">🎤</div>
                <div class="card-content">
                    <div class="card-title">语音输入</div>
                    <div class="card-desc">实时转文字</div>
                </div>
            </div>
        </div>

        <div class="section-title">快捷工具</div>
        <div class="card-grid">
            <div class="card" onclick="v(); window.location.href='/b'">
                <div class="card-icon">⚡</div>
                <div class="card-content">
                    <div class="card-title">Macro Deck</div>
                    <div class="card-desc">快捷按键面板</div>
                </div>
            </div>

            <div class="card" onclick="v(); window.location.href='/controller'">
                <div class="card-icon">🎮</div>
                <div class="card-content">
                    <div class="card-title">手柄映射</div>
                    <div class="card-desc">游戏手柄控制</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-dot"></div>
            <span>服务器已连接</span>
        </div>

        <div class="footer">
            AirMouse Remote v2.0
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function feedback() {
            if (navigator.vibrate) navigator.vibrate(30);
            if (audioCtx) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        }
        const v = feedback;
    </script>
</body>
</html>
